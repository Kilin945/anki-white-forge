<div class="front-wrap">
  <div class="word">{{Front}}</div>
  <div class="play-row" onclick="var b=this.querySelector('.replay-button');if(b)b.click();">
    <div class="front-audio">{{Front_Audio}}</div>
    <span class="audio-label">play sentence</span>
  </div>
</div>
<script>
(function () {
  function fit() {
    var el = document.querySelector('.word');
    if (!el) return;
    el.style.fontSize = '';                       // reset to CSS size each time
    el.style.whiteSpace = 'nowrap';               // measure the word/phrase as one line
    var p = el.parentElement, cs = getComputedStyle(p);
    var avail = p.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight) - 1;
    if (avail > 0 && el.scrollWidth > avail) {    // wider than screen → shrink to fit one line
      var size = parseFloat(getComputedStyle(el).fontSize);
      size = Math.max(28, Math.floor(size * avail / el.scrollWidth)); // 28px readable floor
      el.style.fontSize = size + 'px';
      for (var i = 0; el.scrollWidth > avail && size > 28 && i < 60; i++) {
        el.style.fontSize = (--size) + 'px';      // fine-tune; 28px floor keeps it readable
      }
    }
    el.style.whiteSpace = '';                     // restore: extreme token wraps (overflow-wrap)
  }
  fit();
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit); // refit after webfont loads
  if (!window.__wordFitResize) {            // Anki reruns this script per card — bind resize only once
    window.__wordFitResize = true;
    window.addEventListener('resize', fit); // fit() re-queries .word each call, so it tracks the current card
  }
})();
</script>
